# vit_spiralnet — FGVC Aircraft

# Dataset
dataset: aircraft
data_dir: ./data/aircraft
img_size: 224
num_workers: 4

# Training
num_epochs: 25
batch_size: 12
seed: 42

# Optimizer
optimizer: adamw
lr: 0.001
weight_decay: 0.01

# Scheduler
scheduler: cosine_warmup
warmup_steps: 500

# Loss
label_smoothing: 0.1

# SpinalNet head
spinalnet_layer_width: 512
spinalnet_dropout: 0.5

# Early stopping
early_stopping_patience: 5

# Checkpoints & logging
checkpoint_dir: ./checkpoints/vit_spiralnet_aircraft
run_name: vit_spiralnet_aircraft
wandb_project: fine-grained-clf
use_wandb: true
log_dir: ./logs
