# vit_slow — Stanford Cars
# Reflects the final best configuration from Phase 3 (Experiment 11):
# LR halved from 0.003 to 0.0005 after tripling from baseline achieved 95.46% val acc.

# Dataset
dataset: cars
data_dir: ./data/cars
img_size: 224
num_workers: 4

# Training
num_epochs: 30
batch_size: 12
seed: 42

# Optimizer
optimizer: adamw
lr: 0.0005
weight_decay: 0.01

# Scheduler
scheduler: cosine_warmup
warmup_steps: 500

# Loss
label_smoothing: 0.1

# Early stopping
early_stopping_patience: 5

# Checkpoints & logging
checkpoint_dir: ./checkpoints/vit_slow_cars
run_name: vit_slow_cars
wandb_project: fine-grained-clf
use_wandb: true
log_dir: ./logs
