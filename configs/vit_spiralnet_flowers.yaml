# vit_spiralnet — Oxford Flowers 102
# Uses SpinalNet classification head with LeakyReLU and LabelSmoothingCrossEntropy.

# Dataset
dataset: flowers102
data_dir: ./data/flowers102
img_size: 224
num_workers: 4

# Training
num_epochs: 30
batch_size: 12
seed: 42

# Optimizer
optimizer: adamw
lr: 0.001
weight_decay: 0.01

# Scheduler
scheduler: cosine_warmup
warmup_steps: 500

# Loss (label smoothing required for SpinalNet variant — paper finding)
label_smoothing: 0.1

# SpinalNet head
spinalnet_layer_width: 512
spinalnet_dropout: 0.5

# Early stopping
early_stopping_patience: 5

# Checkpoints & logging
checkpoint_dir: ./checkpoints/vit_spiralnet_flowers
run_name: vit_spiralnet_flowers
wandb_project: fine-grained-clf
use_wandb: true
log_dir: ./logs
